<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
  <title>CareConnect | Smart Redirect</title>
  <style>
    body { background-color: #f8f9fb; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #00685f; }
    .loader { border: 3px solid #f3f4f6; border-top: 3px solid #00685f; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .content { text-align: center; }
  </style>
</head>
<body>
  <div class="content">
    <div class="loader"></div>
    <p>Loading your experience...</p>
  </div>
  <script>
    (function () {
      /**
       * Robust Device Detection & View Routing Mechanism
       * Detects viewport, User-Agent, and touch capability to classify device.
       */
      function detectDevice() {
        const ua = navigator.userAgent;
        const width = window.innerWidth || document.documentElement.clientWidth;
        
        // 1.1 Viewport Detection (Mobile <= 768px, Desktop >= 769px)
        const isMobileViewport = width <= 768;
        
        // 1.2 Physical Device Type Detection
        const isIphone = /iPhone/i.test(ua);
        const isAndroidPhone = /Android/i.test(ua) && /Mobile/i.test(ua);
        const isIpad = /iPad/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isAndroidTablet = /Android/i.test(ua) && !/Mobile/i.test(ua);
        const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        
        // Orientation detection
        const isPortrait = window.matchMedia("(orientation: portrait)").matches;
        
        // 1.1 Logic to classify incoming request
        // We prioritize viewport width but also consider tablet status.
        // For this prototype, tablets (iPad/Android Tablet) >= 769px get desktop view.
        let classification = isMobileViewport ? 'mobile' : 'desktop';
        
        // If it's a known phone UA but viewport is somehow large (rare), still prefer mobile.
        if ((isIphone || isAndroidPhone) && !isMobileViewport && width < 1024) {
          classification = 'mobile';
        }

        return {
          class: classification,
          details: {
            ua: ua,
            isIphone,
            isAndroidPhone,
            isIpad,
            isAndroidTablet,
            hasTouch,
            isPortrait,
            width: width
          }
        };
      }

      const deviceData = detectDevice();
      
      // 1.3 Store classification in sessionStorage for non-blocking context
      sessionStorage.setItem('cc_device_class', deviceData.class);
      sessionStorage.setItem('cc_device_details', JSON.stringify(deviceData.details));

      // 2.1 Redirect to matching view bundle
      const target = deviceData.class === 'mobile' 
        ? 'prototype_mobile/code_home.html' 
        : 'prototype_desktop/code_landing.html';
      
      // 2.3 Preload hint for the detected view (simulated via immediate replace)
      window.location.replace(target);
    })();
  </script>
</body>
</html>
